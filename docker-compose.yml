services:
  nexora-site:
    build:
      context: /root/nexora/next-site
    container_name: nexora-site
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:3000"
    environment:
      ADMIN_USER: root
      ADMIN_PASSWORD: root$$root124
      CONTENT_DIR: /app/data
    volumes:
      - /var/lib/nexora-next:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all(['/', '/courses', '/consulting', '/nfc-cards', '/documents'].map((path) => fetch('http://127.0.0.1:3000' + path))).then((responses) => process.exit(responses.every((response) => response.ok) ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nexora-api:
    build:
      context: /opt/nexora-api
    container_name: nexora-api
    restart: unless-stopped
    env_file:
      - path: /etc/nexora-api.env
        format: raw
    environment:
      HOST: 0.0.0.0
      SITE_ROOT: /var/www/nexora
      SOURCE_ROOT: /workspace/nexora
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - /var/lib/nexora-api:/var/lib/nexora-api
      - /var/log/nexora-api:/var/log/nexora-api
      - /var/www/nexora:/var/www/nexora
      - /root/nexora:/workspace/nexora
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
